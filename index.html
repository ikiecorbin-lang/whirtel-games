<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>WHIRTEL — Back When Fun Was Homemade</title>

<style>
  :root{
    --bg:#020617;
    --shadow: rgba(0,0,0,.65);
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:var(--bg);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    color:#fff;
  }

  .wrap{
    max-width: 1400px;
    margin: 0 auto;
    padding: 14px;
  }

  .hero{
    position:relative;
    width:100%;
    aspect-ratio: 16 / 9;
    border-radius: 22px;
    overflow:hidden;
    box-shadow: 0 28px 85px var(--shadow);
    background:#0b1220;

    /* ✅ THIS MUST MATCH YOUR FILE NAME */
    background: url("homebanner.jpeg") center / cover no-repeat;
  }

  .hero::after{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(to bottom, rgba(0,0,0,.06), rgba(0,0,0,.25));
    pointer-events:none;
  }

  .hotspots{
    position:absolute;
    inset:0;
    z-index:5;
  }

  .hot{
    position:absolute;
    display:block;
    border-radius: 18px;
  }

  /* Click areas for the 3 buttons */
  .hot.gravity{
    left: 7.2%;
    top: 72.5%;
    width: 27.5%;
    height: 18.5%;
  }
  .hot.clash{
    left: 36.4%;
    top: 72.5%;
    width: 27.5%;
    height: 18.5%;
  }
  .hot.swirl{
    left: 65.6%;
    top: 72.5%;
    width: 27.5%;
    height: 18.5%;
  }

  .foot{
    margin-top: 12px;
    display:flex;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
    opacity:.85;
    font-weight:800;
    font-size:13px;
  }
  .foot a{ color:#7dd3fc; text-decoration:none; }

  @media (max-width: 820px){
    .hero{ aspect-ratio: 4 / 5; }
    .mobileBar{
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
      margin-top: 12px;
    }
    .mobileBar a{
      text-decoration:none;
      font-weight:1000;
      text-transform:uppercase;
      letter-spacing:.05em;
      padding:14px 14px;
      border-radius:16px;
      color:#0b1220;
      box-shadow:0 14px 40px rgba(0,0,0,.45);
    }
    .mobileBar a:nth-child(1){ background: linear-gradient(135deg,#38bdf8,#0ea5e9); }
    .mobileBar a:nth-child(2){ background: linear-gradient(135deg,#f97316,#ef4444); }
    .mobileBar a:nth-child(3){ background: linear-gradient(135deg,#facc15,#fde047); }
  }

  @media (min-width: 821px){
    .mobileBar{ display:none; }
  }
</style>
</head>

<body>
  <div class="wrap">

   <div class="hero" role="img" aria-label="WHIRTEL home poster">
 <div class="hero" role="img" aria-label="WHIRTEL home poster">
  <div class="hotspots">
    <a class="hot gravity" href="solo-chill/" title="Play Gravity"></a>
    <a class="hot clash" href="gravity-clash/" title="Play Gravity Clash"></a>
    <a class="hot swirl" href="connect-swirl/" title="Play Connect Even More — Swirl"></a>
  </div>
</div>
    

    <div class="mobileBar">
      <a href="gravity.html">Play Gravity</a>
      <a href="gravity-clash.html">Play Gravity Clash</a>
      <a href="connect-swirl.html">Play Swirl</a>
    </div>

    <div class="foot">
      <div>© <span id="yr"></span> WHIRTEL</div>
      <div><a href="mailto:hello@whirtel.com">hello@whirtel.com</a></div>
    </div>

  </div>

<script>
  document.getElementById("yr").textContent = new Date().getFullYear();
</script>
</body>
</html>
